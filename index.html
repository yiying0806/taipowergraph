<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台電歷年發電結構互動視覺化 (1950-2025)</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        body { font-family: "Microsoft JhengHei", Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        header { text-align: center; margin-bottom: 30px; }
        h1 { color: #2c3e50; margin-bottom: 10px; }
        .description { color: #7f8c8d; line-height: 1.6; }
        #main-chart { width: 100%; height: 600px; margin-top: 20px; }
        .footer { margin-top: 20px; font-size: 12px; color: #95a5a6; text-align: center; }
        .control-panel { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        button { padding: 8px 16px; cursor: pointer; background: #3498db; color: white; border: none; border-radius: 4px; transition: 0.3s; }
        button:hover { background: #2980b9; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>台灣發電結構歷史變遷 (1950-2025)</h1>
        <p class="description">透過此互動圖表觀察台灣從早期水力發電、核能興起，到現代能源轉型的完整歷程。</p>
    </header>

    <div class="control-panel">
        <button onclick="toggleStack()">切換堆疊 / 比例模式</button>
    </div>

    <div id="main-chart"></div>

    <div class="footer">
        數據來源：台電系統歷年發購電量表 | 單位：億度 (10^8 kWh)
    </div>
</div>

<script>
    // 原始數據
    const rawData = [
        {"年":1950,"再生能源":9.69,"燃煤":0.68,"燃油":0.01,"燃氣":0.0,"汽電共生":0.0,"抽蓄水力":0.0,"核能":0.0,"電池儲能":0.0},
        {"年":1960,"再生能源":20.65,"燃煤":15.25,"燃油":0.38,"燃氣":0.0,"汽電共生":0.0,"抽蓄水力":0.0,"核能":0.0,"電池儲能":0.0},
        {"年":1970,"再生能源":27.1,"燃煤":13.92,"燃油":100.99,"燃氣":13.1,"汽電共生":0.0,"抽蓄水力":0.0,"核能":0.0,"電池儲能":0.0},
        {"年":1980,"再生能源":24.52,"燃煤":60.36,"燃油":246.33,"燃氣":0.0,"汽電共生":0.0,"抽蓄水力":0.0,"核能":78.68,"電池儲能":0.0},
        {"年":1990,"再生能源":61.64,"燃煤":234.3,"燃油":196.88,"燃氣":10.64,"汽電共生":23.75,"抽蓄水力":35.2,"核能":335.25,"電池儲能":0.0},
        {"年":2000,"再生能源":45.41,"燃煤":618.1,"燃油":242.21,"燃氣":164.96,"汽電共生":81.45,"抽蓄水力":43.03,"核能":369.96,"電池儲能":0.0},
        {"年":2010,"再生能源":61.02,"燃煤":876.53,"燃油":93.41,"燃氣":608.61,"汽電共生":42.71,"抽蓄水力":31.06,"核能":416.29,"電池儲能":0.0},
        {"年":2020,"再生能源":139.75,"燃煤":855.98,"燃油":40.89,"燃氣":1018.67,"汽電共生":50.84,"抽蓄水力":31.25,"核能":314.42,"電池儲能":0.0},
        {"年":2024,"再生能源":300.16,"燃煤":782.29,"燃油":34.45,"燃氣":1187.49,"汽電共生":59.19,"抽蓄水力":30.66,"核能":117.27,"電池儲能":2.94},
        {"年":2025,"再生能源":319.51,"燃煤":671.6,"燃油":35.55,"燃氣":1344.47,"汽電共生":84.17,"抽蓄水力":30.93,"核能":31.19,"電池儲能":7.01}
        // (此處為了代碼簡潔僅列出關鍵年份，實際應用中可填入完整 75 筆數據)
    ];

    // 由於數據量較大，這裡模擬完整年份的標籤
    const years = Array.from({length: 2026 - 1950}, (_, i) => 1950 + i);
    
    // 如果你有完整數據，這裡應該映射所有年份
    const categories = ['再生能源', '燃煤', '燃油', '燃氣', '汽電共生', '抽蓄水力', '核能', '電池儲能'];
    
    const chartDom = document.getElementById('main-chart');
    const myChart = echarts.init(chartDom);
    let isStacked = true;

    function getOption() {
        return {
            tooltip: {
                trigger: 'axis',
                axisPointer: { type: 'cross', label: { backgroundColor: '#6a7985' } }
            },
            legend: { data: categories, bottom: 0 },
            grid: { left: '3%', right: '4%', bottom: '10%', containLabel: true },
            xAxis: [
                {
                    type: 'category',
                    boundaryGap: false,
                    data: rawData.map(d => d.年)
                }
            ],
            yAxis: [
                {
                    type: 'value',
                    name: isStacked ? '發電量 (億度)' : '佔比 (%)',
                    max: isStacked ? null : 100
                }
            ],
            series: categories.map(cat => ({
                name: cat,
                type: 'line',
                stack: 'Total',
                areaStyle: {},
                emphasis: { focus: 'series' },
                data: rawData.map(d => {
                    if (isStacked) return d[cat];
                    const total = categories.reduce((sum, c) => sum + d[c], 0);
                    return ((d[cat] / total) * 100).toFixed(2);
                })
            }))
        };
    }

    myChart.setOption(getOption());

    function toggleStack() {
        isStacked = !isStacked;
        myChart.setOption(getOption(), true);
    }

    // 響應式調整
    window.addEventListener('resize', myChart.resize);
</script>

</body>
</html>
